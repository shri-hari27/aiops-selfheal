apiVersion: apps/v1
kind: Deployment

metadata:
  name: aiops-selfheal
  namespace: aiops

spec:
  replicas: 2

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: aiops-selfheal

  template:
    metadata:
      labels:
        app: aiops-selfheal

    spec:
      containers:
      - name: aiops-selfheal

        image: ghcr.io/shri-hari27/aiops-selfheal:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        envFrom:
        - configMapRef:
            name: aiops-config

        - secretRef:
            name: aiops-secret

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "256Mi"

        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000

          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000

          initialDelaySeconds: 10
          periodSeconds: 10