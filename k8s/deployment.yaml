apiVersion: apps/v1
kind: Deployment

metadata:
  name: aiops-selfheal

spec:
  replicas: 2

  selector:
    matchLabels:
      app: aiops-selfheal

  template:
    metadata:
      labels:
        app: aiops-selfheal

    spec:
      containers:
        - name: aiops-selfheal
          image: ghcr.io/shri-hari27/aiops-selfheal:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8000
