replicaCount: 2

image:
  repository: ghcr.io/shri-hari27/aiops-selfheal
  tag: latest
  pullPolicy: IfNotPresent

namespace:
  name: aiops

service:
  type: NodePort
  port: 8000
  targetPort: 8000
  nodePort: 30080

config:
  APP_NAME: "AIOps Self-Healing Demo"
  ENVIRONMENT: "Production"
  LOG_LEVEL: "INFO"
  VERSION: "v2.0"

secret:
  API_KEY: "super-secret-api-key"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  path: /health/live
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /health/ready
  initialDelaySeconds: 5
  periodSeconds: 5
